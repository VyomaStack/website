<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VyomaStack</title>
  </head>
  <body>
    <header class="header">
      <div class="brand">
        <span class="logo">V</span>
        <div>
          <p class="title">VyomaStack</p>
          <p class="subtitle">Dev tools in your browser</p>
        </div>
      </div>
    </header>

    <nav class="tabs" role="tablist">
      <button type="button" class="tab active" data-tool="sql">SQL</button>
      <button type="button" class="tab" data-tool="json">JSON</button>
      <button type="button" class="tab" data-tool="jwt">JWT</button>
    </nav>

    <main class="main">
      <textarea
        id="input"
        class="textarea"
        placeholder="Paste or use right-click → VyomaStack on selected text..."
        spellcheck="false"
      ></textarea>

      <div class="actions">
        <button type="button" id="btn-primary" class="btn btn-primary">
          Format
        </button>
        <button type="button" id="btn-secondary" class="btn btn-secondary">
          Minify
        </button>
        <button type="button" id="btn-copy" class="btn btn-secondary">
          Copy
        </button>
      </div>

      <p id="error" class="error" hidden></p>

      <textarea
        id="output"
        class="textarea output"
        readonly
        placeholder="Output appears here..."
        spellcheck="false"
      ></textarea>
    </main>

    <footer class="footer">
      <a id="open-site" href="https://www.vyomastack.com/tools/sql-formatter" target="_blank" rel="noopener">
        Open full tool →
      </a>
      <a href="https://www.vyomastack.com" target="_blank" rel="noopener">
        vyomastack.com
      </a>
    </footer>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
